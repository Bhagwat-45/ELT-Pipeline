services:
  source_postgres:
    image: postgres:18
    ports:
      - "5433:5432"
    networks:
      - elt_network
    environment:
       POSTGRES_DB: source_db
       POSTGRES_USER: postgres
       POSTGRES_PASSWORD: secret
    volumes:
      - ./source_db_init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
      start_period: 5s

  destination_postgres:
    image: postgres:18
    ports:
      - "5434:5432"
    networks:
      - elt_network
    environment:
      POSTGRES_DB: destination_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5
      start_period: 5s

  elt_script:
    build: 
      context: ./elt
      dockerfile: Dockerfile 
    command: ["python", "elt_script.py"]
    networks:
      - elt_network
    depends_on:
      source_postgres:
        condition: service_healthy      # ← wait for postgres to be ready
      destination_postgres:
        condition: service_healthy      # ← wait for postgres to be ready

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:latest
    command:
      [
        "run",
        "--profiles-dir",
        "/root",
        "--project-dir",
        "/dbt",
        "--full-refresh"
      ]
    networks:
      - elt_network
    volumes:
      - ./custom_postgres:/dbt
      - ~/.dbt:/root
    depends_on:
      elt_script:
        condition: service_completed_successfully  # ← wait for ELT to finish
    environment:
      DBT_PROFILE: custom_postgres
      DBT_TARGET: dev

networks:
  elt_network: 
    driver: bridge